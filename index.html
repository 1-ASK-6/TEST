<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            color: #333;
        }
        input {
            width: 80%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Marks Calculator</h2>
    <input type="number" id="subject1" placeholder="Enter marks for Subject 1" min="0" max="100">
    <input type="number" id="subject2" placeholder="Enter marks for Subject 2" min="0" max="100">
    <input type="number" id="subject3" placeholder="Enter marks for Subject 3" min="0" max="100">
    <br>
    <button onclick="calculateMarks()">Calculate</button>
    <div class="result" id="result"></div>
</div>

<script>
function calculateMarks() {
    // Get input values
    let s1 = parseFloat(document.getElementById('subject1').value);
    let s2 = parseFloat(document.getElementById('subject2').value);
    let s3 = parseFloat(document.getElementById('subject3').value);

    // Validate inputs
    if (isNaN(s1) || isNaN(s2) || isNaN(s3)) {
        document.getElementById('result').innerHTML = "⚠ Please enter all marks.";
        return;
    }

    // Calculate total and average
    let total = s1 + s2 + s3;
    let average = total / 3;

    // Display results
    document.getElementById('result').innerHTML = 
        `Total = ${total} <br> Average = ${average.toFixed(1)}`;
}
</script>

</body>
</html>
