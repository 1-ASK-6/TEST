<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Game Pro</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    flex-direction: column;
  }
  canvas {
    background: #000;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,255,0,0.5);
  }
  .hud {
    margin-bottom: 10px;
    display: flex;
    gap: 20px;
    font-size: 18px;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: lime;
    color: black;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="hud">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
  <button onclick="resetGame()">Restart</button>
</div>

<canvas id="game" width="400" height="400"></canvas>
<audio id="eatSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="gameOverSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const grid = 20;
let count = 0;

let score = 0;
let highScore = localStorage.getItem("snakeHighScore") || 0;
document.getElementById("highScore").innerText = highScore;

let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
let apple = { x: 320, y: 320 };

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

function loop() {
  requestAnimationFrame(loop);
  if (++count < 4) return;
  count = 0;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
    gameOver();
  }

  snake.cells.unshift({ x: snake.x, y: snake.y });
  if (snake.cells.length > snake.maxCells) snake.cells.pop();

  // Draw apple
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(apple.x + 10, apple.y + 10, 8, 0, Math.PI * 2);
  ctx.fill();

  // Draw snake
  snake.cells.forEach((cell, index) => {
    ctx.fillStyle = `hsl(${index * 10}, 100%, 50%)`;
    ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

    if (cell.x === apple.x && cell.y === apple.y) {
      document.getElementById("eatSound").play();
      snake.maxCells++;
      score++;
      document.getElementById("score").innerText = score;
      apple.x = getRandomInt(0, 20) * grid;
      apple.y = getRandomInt(0, 20) * grid;
    }

    for (let i = index + 1; i < snake.cells.length; i++) {
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        gameOver();
      }
    }
  });
}

function gameOver() {
  document.getElementById("gameOverSound").play();
  if (score > highScore) {
    localStorage.setItem("snakeHighScore", score);
  }
  alert("Game Over! Score: " + score);
  resetGame();
}

function resetGame() {
  snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
  apple.x = getRandomInt(0, 20) * grid;
  apple.y = getRandomInt(0, 20) * grid;
  score = 0;
  document.getElementById("score").innerText = score;
  highScore = localStorage.getItem("snakeHighScore") || 0;
  document.getElementById("highScore").innerText = highScore;
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
  else if (e.key === "ArrowUp" && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
  else if (e.key === "ArrowRight" && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
  else if (e.key === "ArrowDown" && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
});

requestAnimationFrame(loop);
</script>
</body>
</html>
